name: Setup Checks

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell-checks:
    name: Shell Checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check Bash syntax
        run: |
          for file in install.sh setup.sh lib/common.sh groups/*.sh; do
            bash -n "$file"
          done

      - name: Run ShellCheck
        run: shellcheck -x install.sh setup.sh lib/common.sh groups/*.sh

      - name: Check group discovery
        run: ./setup.sh --list

      - name: Run safe verification smoke test
        run: |
          ubuntu_major="$(. /etc/os-release && printf '%s' "${VERSION_ID%%.*}")"
          SUPPORTED_UBUNTU_MAJOR="$ubuntu_major" ./setup.sh --verify --only cleanup
